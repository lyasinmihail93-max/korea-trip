font-size: 0.7em;

.section.collapsed .toggle-icon {
transform: rotate(0deg);

.section:not(.collapsed) .toggle-icon {
transform: rotate(180deg);
}
.section-content {
display: none;
background: white;
}
.section:not(.collapsed) .section-content {
display: block;
animation: slideDown 0.3s ease;
}
@keyframes slideDown {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }

height: 44px;

z-index: 99;
}
@media (min-width: 768px) {

// --- НОВАЯ ФУНКЦИЯ: Отрисовка иконок звёзд ---
function renderStars(rating) {
const fullStars = Math.floor(rating);
const hasHalfStar = rating % 1 >= 0.5; // Проверяем, есть ли 0.5
let starsHtml = '';
for (let i = 0; i < fullStars; i++) {
starsHtml += '★'; // Полная звезда
}
if (hasHalfStar) {
starsHtml += '☆'; // Половинка звезды
}
// Оставшиеся пустые звёзды до 5
for (let i = fullStars + (hasHalfStar ? 1 : 0); i < 5; i++) {
starsHtml += '☆';
}
return `<span class="item-stars">${starsHtml}</span>`;
}

// === ФУНКЦИИ ===
function renderItinerary() {
return `
<img src="route-map.jpg" alt="Маршрут по Южной Корее" class="route-map">
<table class="calendar">
<thead><tr><th>Дата</th><th>Город</th><th>Событие</th><th>Время</th></tr></thead>
<tbody>${itinerary.map(i => `<tr><td>${i.date}</td><td>${i.city}</td><td>${i.event}</td><td>${i.time}</td></tr>`).join('')}</tbody>
</table>
`;
}

function renderSights() {
let html = '';
places.forEach(cityData => {
html += `<div class="section collapsed"><div class="section-header">${cityData.city} (${cityData.dates})<span class="toggle-icon">▼</span></div><div class="section-content">`;
cityData.items.forEach(item => {
const id = `place-${cityData.city}-${item.name}`;
const isVisited = visitedPlaces[id];
html += `
<div class="item ${isVisited ? 'visited' : ''}">
<div class="item-name">${item.name}</div>
${renderStars(item.stars)} <!-- Иконки звёзд -->
<div class="item-desc">${item.desc}</div>
${item.price ? `<div class="price-infoход: ${item.price}</div>` : ''}
<div class="actions">
<button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅ Посещено' : '☑️ Отметить'}</button>
<button class="btn-google" onclick="window.open('${item.google}', '_blank')">gMaps</button>
<button class="btn-naver" onclick="window.open('${item.naver}', '_blank')">🚗 Naver</button>
</div>
</div>`;
});
html += '</div></div>';
});
return html;
}

function updateProgress() {
const totalPlaces = places.reduce((sum, c) => sum + c.items.length, 0);
const visitedCount = Object.values(visitedPlaces).filter(v => v).length;
const totalEats = eats.reduce((sum, c) => sum + c.items.length, 0);
const visitedEatsCount = Object.values(visitedEats).filter(v => v).length;
document.getElementById('progressBar').innerHTML =
`✅ Посещено: ${visitedCount} / ${totalPlaces} мест | ${visitedEatsCount} / ${totalEats} ресторанов`;
}

// === ИНИЦИАЛИЗАЦИЯ ===
document.addEventListener('DOMContentLoaded', function() {
// Переключение вкладок
document.querySelectorAll('.tab').forEach(tab => {
tab.addEventListener('click', function() {
document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
this.classList.add('active');
const tabName = this.dataset.tab;
let content = '';
if (tabName === 'itinerary') content = renderItinerary();
else if (tabName === 'sights') content = renderSights();
else if (tabName === 'eats') content = renderEats();
else if (tabName === 'spas') content = renderSpas();
document.getElementById('content').innerHTML = content;

// --- ВАЖНО: Вешаем обработчики событий ПОСЛЕ обновления innerHTML ---
// Активация аккордеонов (для новых элементов DOM)
document.querySelectorAll('.section-header').forEach(header => {
header.addEventListener('click', function() {
this.parentElement.classList.toggle('collapsed');
});
});
// Обработка отметок (для новых элементов DOM)
document.querySelectorAll('.btn-done').forEach(btn => {
btn.addEventListener('click', function() {
const id = this.dataset.id;
if (id.startsWith('place-')) {
visitedPlaces[id] = !visitedPlaces[id];
localStorage.setItem('visitedPlaces_korea2026', JSON.stringify(visitedPlaces));
} else if (id.startsWith('eat-')) {
visitedEats[id] = !visitedEats[id];
localStorage.setItem('visitedEats_korea2026', JSON.stringify(visitedEats));
} else if (id.startsWith('spa-')) {
visitedSpas[id] = !visitedSpas[id];
localStorage.setItem('visitedSpas_korea2026', JSON.stringify(visitedSpas));
}
this.textContent = this.textContent.includes('✅') ? '☑️ Отметить' : '✅ Посещено';
this.classList.toggle('done');
// Обновляем прогресс
updateProgress();
});
});
// Обновляем прогресс
updateProgress();
});
});

else btn.style.display = 'none';
});
