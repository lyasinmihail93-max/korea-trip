<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🇰🇷 Южная Корея — Наше свадебное путешествие</title>
  <style>
    :root {
      --primary: #2a9d8f;
      --accent: #e9c46a;
      --bg: #ffffff;
      --text: #264653;
      --light-text: #6a7b7d;
      --visited-bg: #e8f7f5;
      --border: #e0e6e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      line-height: 1.5;
    }
    header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.3em;
      margin-bottom: 4px;
      color: var(--primary);
    }
    .subtitle {
      font-size: 0.9em;
      color: var(--light-text);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tab {
      flex: 1;
      min-width: 100px;
      padding: 10px;
      background: #f0f5f5;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
    }
    .tab.active {
      background: var(--primary);
      color: white;
    }

    /* City section */
    .section {
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(42, 157, 143, 0.1);
      border-left: 4px solid var(--primary);
    }
    .section-header {
      background: white;
      padding: 14px 16px;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-dates {
      color: var(--light-text);
      font-size: 0.9em;
      margin-left: 8px;
    }
    .section-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .toggle-icon {
      font-size: 0.7em;
      transition: transform 0.3s;
    }
    .section.collapsed .toggle-icon {
      transform: rotate(0deg);
    }
    .section:not(.collapsed) .toggle-icon {
      transform: rotate(180deg);
    }
    .section-content {
      display: none;
      background: white;
    }
    .section:not(.collapsed) .section-content {
      display: block;
    }

    /* Item */
    .item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .item:last-child {
      border-bottom: none;
    }
    .item.visited {
      background-color: var(--visited-bg);
    }
    .item.visited .item-name,
    .item.visited .item-desc {
      color: #5a7b7a;
      text-decoration: line-through;
    }
    .item.visited::before {
      content: "✅ ";
      color: var(--primary);
    }
    .item-name {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 1.05em;
    }
    .item-meta {
      font-size: 0.85em;
      color: var(--light-text);
      margin-bottom: 6px;
      display: flex;
      gap: 12px;
    }
    .stars {
      color: #FFD700;
    }
    .item-desc {
      font-size: 0.95em;
      margin: 8px 0;
      color: var(--text);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    button {
      flex: 1;
      min-width: 90px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-done {
      background: #e0f2f1;
      color: var(--primary);
    }
    .btn-done.done {
      background: #b2dfdb;
      color: #00695c;
    }
    .btn-google {
      background: #e3f2fd;
      color: #1565c0;
    }
    .btn-naver {
      background: #f9fbe7;
      color: #5d4037;
    }
    .btn-lodging {
      background: #fff8e1;
      color: #ff8f00;
      font-weight: bold;
    }

    @media (min-width: 768px) {
      body { max-width: 800px; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Южная Корея — наше свадебное путешествие</h1>
    <p class="subtitle">Июль–август 2026</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="itinerary">🗓️ Маршрут</button>
    <button class="tab" data-tab="sights">🗺️ Места</button>
    <button class="tab" data-tab="eats">🍽️ Еда</button>
  </div>

  <div id="content"></div>

  <script>
    // === ДАННЫЕ ===
    const itinerary = [
      { date: "25.07", day: "Сб", event: "Свадьба, Ульяновск" },
      { date: "26.07", day: "Вс", event: "Свадьба, второй день" },
      { date: "27.07", day: "Пн", event: "Ульяновск → Москва" },
      { date: "28.07", day: "Вт", event: "Москва → Пекин (ночной перелёт)" },
      { date: "29.07", day: "Ср", event: "Пекин → Чеджудо (17:55)" },
      { date: "30–31.07", day: "", event: "Чеджудо — пляжи, Hallasan, Seongsan" },
      { date: "01.08", day: "Сб", event: "Чеджудо → Сеул (17:30)" },
      { date: "02–03.08", day: "", event: "Сеул — дворцы, ханоки, шопинг" },
      { date: "04.08", day: "Вт", event: "Сеул → Чонджу → Чиндо" },
      { date: "05.08", day: "Ср", event: "Чиндо — Мост чуда" },
      { date: "06.08", day: "Чт", event: "Чиндо → Пусан" },
      { date: "07–08.08", day: "", event: "Пусан — пляжи, храмы, рынки" },
      { date: "09.08", day: "Вс", event: "Пусан → Кёнджу → Андон" },
      { date: "10.08", day: "Пн", event: "Андон → Сокчхо" },
      { date: "11–12.08", day: "", event: "Сокчхо — Сораксан, море" },
      { date: "13–16.08", day: "", event: "Сокчхо → Сеул — финальный шопинг" },
      { date: "17.08", day: "Пн", event: "Сеул → Шанхай → Москва" }
    ];

    const places = [
      { city: "Чеджудо", dates: "29–31.07", lodging: { google: "https://www.google.com/maps/place/271+Taesinhaean-ro,+Seogwipo-si,+Jeju-do+63616", naver: "https://map.naver.com/p/search/271+Taesinhaean-ro" }, items: [
        { name: "Seongsan Ilchulbong Peak", stars: 5, desc: "Вулканический кратер у моря, знаменит восходами солнца. UNESCO.", google: "https://www.google.com/maps/place/Seongsan+Ilchulbong/@33.458397,126.942603,15z", naver: "https://map.naver.com/p/place/11958935" },
        { name: "Hallasan National Park", stars: 5, desc: "Высочайшая гора Южной Кореи. Тропа Eorimok — подъём ~2 ч.", google: "https://www.google.com/maps/place/Hallasan+National+Park/@33.3605,126.5389,13z", naver: "https://map.naver.com/p/place/11845672" }
      ]},
      { city: "Сеул", dates: "01–03.08 / 13–16.08", lodging: { google: "https://www.google.com/maps/place/12,+Daehak-ro+2-gil,+Jongno-gu,+Seoul+03126", naver: "https://map.naver.com/p/search/12+Daehak-ro+2-gil" }, items: [
        { name: "Gyeongbokgung Palace", stars: 5, desc: "Главный королевский дворец династии Чосон.", google: "https://www.google.com/maps/place/Gyeongbokgung+Palace/@37.5788,126.9773,17z", naver: "https://map.naver.com/p/place/11789456" },
        { name: "Everland Resort", stars: 5, desc: "Крупнейший тематический парк Южной Кореи.", google: "https://www.google.com/maps/place/Everland/@37.2338,127.3485,15z", naver: "https://map.naver.com/p/place/11789458" }
      ]},
      { city: "Чиндо", dates: "04–05.08", lodging: { google: "https://www.google.com/maps/place/Pyedong-gil,+Imhoe-myeon,+Jindo-gun,+Jeollanam-do+539-840", naver: "https://map.naver.com/p/search/Pyedong-gil+Jindo" }, items: [
        { name: "Jindo Miracle Sea Road", stars: 5, desc: "«Мост Моисея» — море расступается (весной).", google: "https://www.google.com/maps/place/Jindo+Miracle+Sea+Road/@34.4289,126.2889,15z", naver: "https://map.naver.com/p/place/11789459" }
      ]},
      { city: "Пусан", dates: "06–08.08", lodging: { google: "https://www.google.com/maps/place/2F,+11,+Gunam-ro+8beon-gil,+Haeundae-gu,+Busan+48094", naver: "https://map.naver.com/p/search/Gunam-ro+8beon-gil" }, items: [
        { name: "Haedong Yonggungsa Temple", stars: 5, desc: "Буддийский храм прямо у моря.", google: "https://www.google.com/maps/place/Haedong+Yonggungsa+Temple/@35.2389,129.2089,15z", naver: "https://map.naver.com/p/place/11789460" }
      ]},
      { city: "Андон", dates: "09.08", lodging: { google: "https://www.google.com/maps/place/737-7,+Gyeongdong-ro,+Andong,+Gyeongsangbuk-do+36704", naver: "https://map.naver.com/p/search/737-7+Gyeongdong-ro" }, items: [
        { name: "Hahoe Folk Village", stars: 5, desc: "Традиционная деревня у реки Накдонган.", google: "https://www.google.com/maps/place/Hahoe+Folk+Village/@36.4989,128.5889,15z", naver: "https://map.naver.com/p/place/11789462" }
      ]},
      { city: "Сокчхо", dates: "10–12.08", lodging: { google: "https://www.google.com/maps/place/17F,+11,+Yeongnanghaean+8-gil,+Sokcho+24808", naver: "https://map.naver.com/p/search/Yeongnanghaean+8-gil" }, items: [
        { name: "Soraksan National Park", stars: 5, desc: "Грандиозные скалы, леса, водопады.", google: "https://www.google.com/maps/place/Seoraksan+National+Park/@38.1389,128.4589,13z", naver: "https://map.naver.com/p/place/11789463" }
      ]}
    ];

    const eats = [
      { city: "Чеджудо", name: "Black Pork Street", stars: 5, desc: "Знаменитая чеджуская чёрная свинина.", google: "https://www.google.com/maps/place/Black+Pork+Street/@33.2531,126.5589,15z", naver: "https://map.naver.com/p/place/11789465" },
      { city: "Сеул", name: "Myeongdong Kyoja", stars: 5, desc: "Легендарная лапша kalguksu.", google: "https://www.google.com/maps/place/Myeongdong+Kyoja/@37.5589,126.9889,17z", naver: "https://map.naver.com/p/place/11789466" },
      { city: "Пусан", name: "Milmyeon at Naegohyang", stars: 5, desc: "Холодная пшеничная лапша.", google: "https://www.google.com/maps/place/Naegohyang+Milmyeon/@35.1022,129.0403,17z", naver: "https://map.naver.com/p/place/11789468" }
    ];

    let visitedPlaces = JSON.parse(localStorage.getItem('visitedPlaces_korea2026')) || {};
    let visitedEats = JSON.parse(localStorage.getItem('visitedEats_korea2026')) || {};

    function renderItinerary() {
      let html = '<div class="section"><div class="section-header">🗓️ Маршрут по дням</div><div class="section-content">';
      itinerary.forEach(item => {
        html += `<div class="item"><strong>${item.date} ${item.day}</strong><br>${item.event}</div>`;
      });
      html += '</div></div>';
      return html;
    }

    function renderSights() {
      let html = '';
      places.forEach(cityData => {
        html += `
          <div class="section collapsed">
            <div class="section-header">
              <div class="section-title">
                <span>${cityData.city}</span>
                <span class="section-dates">(${cityData.dates})</span>
              </div>
              <div class="section-actions">
                <button class="btn-lodging" onclick="window.open('${cityData.lodging.google}', '_blank')">gMaps</button>
                <button class="btn-naver" onclick="window.open('${cityData.lodging.naver}', '_blank')">🚗 Naver</button>
                <span class="toggle-icon">▼</span>
              </div>
            </div>
            <div class="section-content">`;
        cityData.items.forEach(item => {
          const id = `place-${cityData.city}-${item.name}`;
          const isVisited = visitedPlaces[id];
          html += `
            <div class="item ${isVisited ? 'visited' : ''}">
              <div class="item-name">${item.name}</div>
              <div class="item-meta"><span class="stars">${'⭐'.repeat(item.stars)}</span></div>
              <div class="item-desc">${item.desc}</div>
              <div class="actions">
                <button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅' : '☑️'} Отметить</button>
                <button class="btn-google" onclick="window.open('${item.google}', '_blank')">gMaps</button>
                <button class="btn-naver" onclick="window.open('${item.naver}', '_blank')">🚗 Naver</button>
              </div>
            </div>`;
        });
        html += '</div></div>';
      });
      return html;
    }

    function renderEats() {
      let html = '<div class="section"><div class="section-header">🍽️ Где поесть</div><div class="section-content">';
      eats.forEach(eat => {
        const id = `eat-${eat.city}-${eat.name}`;
        const isVisited = visitedEats[id];
        html += `
          <div class="item ${isVisited ? 'visited' : ''}">
            <div class="item-name">${eat.city}: ${eat.name}</div>
            <div class="item-meta"><span class="stars">${'⭐'.repeat(eat.stars)}</span></div>
            <div class="item-desc">${eat.desc}</div>
            <div class="actions">
              <button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅' : '☑️'} Отметить</button>
              <button class="btn-google" onclick="window.open('${eat.google}', '_blank')">gMaps</button>
              <button class="btn-naver" onclick="window.open('${eat.naver}', '_blank')">🚗 Naver</button>
            </div>
          </div>`;
      });
      html += '</div></div>';
      return html;
    }

    // === ОБРАБОТЧИКИ ===
    document.addEventListener('click', function(e) {
      // Переключение вкладок
      if (e.target.classList.contains('tab')) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        const tabName = e.target.dataset.tab;
        let content = '';
        if (tabName === 'itinerary') content = renderItinerary();
        else if (tabName === 'sights') content = renderSights();
        else if (tabName === 'eats') content = renderEats();
        document.getElementById('content').innerHTML = content;

        // Активируем аккордеоны
        document.querySelectorAll('.section-header').forEach(header => {
          header.addEventListener('click', function() {
            const section = this.closest('.section');
            section.classList.toggle('collapsed');
          });
        });

        // Обработка отметок
        document.querySelectorAll('.btn-done').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = this.dataset.id;
            if (id.startsWith('place-')) {
              visitedPlaces[id] = !visitedPlaces[id];
              localStorage.setItem('visitedPlaces_korea2026', JSON.stringify(visitedPlaces));
            } else if (id.startsWith('eat-')) {
              visitedEats[id] = !visitedEats[id];
              localStorage.setItem('visitedEats_korea2026', JSON.stringify(visitedEats));
            }
            document.querySelector('.tab.active').click(); // refresh
          });
        });
      }

      // Аккордеоны вне вкладок (на случай)
      if (e.target.closest('.section-header')) {
        const section = e.target.closest('.section');
        section.classList.toggle('collapsed');
      }
    });

    // Загрузка первой вкладки
    window.onload = () => {
      document.querySelector('.tab[data-tab="itinerary"]').click();
    };
  </script>
</body>
</html>
