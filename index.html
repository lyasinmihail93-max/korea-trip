<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🇰🇷 Южная Корея — Наше свадебное путешествие</title>
  <style>
    :root {
      --primary: #2a9d8f;
      --accent: #e9c46a;
      --bg: #ffffff;
      --text: #264653;
      --light-text: #6a7b7d;
      --visited-bg: #e8f7f5;
      --border: #e0e6e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      line-height: 1.5;
    }
    header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.3em;
      margin-bottom: 4px;
      color: var(--primary);
    }
    .subtitle {
      font-size: 0.9em;
      color: var(--light-text);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tab {
      flex: 1;
      min-width: 100px;
      padding: 10px;
      background: #f0f5f5;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
    }
    .tab.active {
      background: var(--primary);
      color: white;
    }

    /* Section */
    .section {
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(42, 157, 143, 0.1);
      border-left: 4px solid var(--primary);
    }
    .section-header {
      background: white;
      padding: 14px 16px;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .toggle-icon {
      font-size: 0.7em;
      transition: transform 0.3s;
    }
    .section.collapsed .toggle-icon {
      transform: rotate(0deg);
    }
    .section:not(.collapsed) .toggle-icon {
      transform: rotate(180deg);
    }
    .section-content {
      display: none;
      background: white;
    }
    .section:not(.collapsed) .section-content {
      display: block;
    }

    /* Calendar */
    .calendar {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    .calendar th,
    .calendar td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 0.9em;
    }
    .calendar th {
      background: #f0f5f5;
      font-weight: 600;
    }

    /* Item */
    .item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .item:last-child {
      border-bottom: none;
    }
    .item.visited {
      background-color: var(--visited-bg);
    }
    .item.visited .item-name,
    .item.visited .item-desc {
      color: #5a7b7a;
      text-decoration: line-through;
    }
    .item.visited::before {
      content: "✅ ";
      color: var(--primary);
    }
    .item-name {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 1.05em;
    }
    .item-meta {
      font-size: 0.85em;
      color: var(--light-text);
      margin-bottom: 6px;
      display: flex;
      gap: 12px;
    }
    .stars {
      color: #FFD700;
    }
    .item-desc {
      font-size: 0.95em;
      margin: 8px 0;
      color: var(--text);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    button {
      flex: 1;
      min-width: 90px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-done {
      background: #e0f2f1;
      color: var(--primary);
    }
    .btn-done.done {
      background: #b2dfdb;
      color: #00695c;
    }
    .btn-google {
      background: #e3f2fd;
      color: #1565c0;
    }
    .btn-naver {
      background: #f9fbe7;
      color: #5d4037;
    }
    .btn-lodging {
      background: #fff8e1;
      color: #ff8f00;
      font-weight: bold;
    }

    @media (min-width: 768px) {
      body { max-width: 800px; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Южная Корея — наше свадебное путешествие</h1>
    <p class="subtitle">Июль–август 2026</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="itinerary">🗓️ Маршрут</button>
    <button class="tab" data-tab="sights">🗺️ Места</button>
    <button class="tab" data-tab="eats">🍽️ Еда</button>
  </div>

  <div id="content"></div>

  <script>
    // === МАРШРУТ (календарь) ===
    const itinerary = [
      { date: "25.07", city: "Ульяновск", event: "Свадьба", time: "весь день" },
      { date: "26.07", city: "Ульяновск", event: "Свадьба, второй день", time: "весь день" },
      { date: "27.07", city: "Ульяновск → Москва", event: "Перелёт", time: "15:00–17:00" },
      { date: "28.07", city: "Москва → Пекин", event: "SVO → PEK", time: "18:50–07:25+1" },
      { date: "29.07", city: "Пекин → Чеджудо", event: "PEK → CJU", time: "14:30–17:55" },
      { date: "30.07", city: "Чеджудо", event: "Пляжи, Hallasan", time: "" },
      { date: "31.07", city: "Чеджудо", event: "Seongsan, Olle Trail", time: "" },
      { date: "01.08", city: "Чеджудо → Сеул", event: "CJU → GMP", time: "16:15–17:30" },
      { date: "02.08", city: "Сеул", event: "Gyeongbokgung, Bukchon", time: "" },
      { date: "03.08", city: "Сеул", event: "Шопинг, подготовка к выезду", time: "" },
      { date: "04.08", city: "Сеул → Чонджу → Чиндо", event: "Автомобиль", time: "09:00–15:00" },
      { date: "05.08", city: "Чиндо", event: "Мост чуда", time: "" },
      { date: "06.08", city: "Чиндо → Пусан", event: "Автомобиль", time: "09:00–13:00" },
      { date: "07.08", city: "Пусан", event: "Хэундэ, Jagalchi", time: "" },
      { date: "08.08", city: "Пусан", event: "Gamcheon, Гваналли", time: "" },
      { date: "09.08", city: "Пусан → Кёнджу → Андон", event: "Автомобиль", time: "09:00–15:00" },
      { date: "10.08", city: "Андон → Сокчхо", event: "Автомобиль", time: "09:00–13:00" },
      { date: "11.08", city: "Сокчхо", event: "Сораксан", time: "" },
      { date: "12.08", city: "Сокчхо", event: "Пляж, отдых", time: "" },
      { date: "13.08", city: "Сокчхо → Сеул", event: "Автомобиль", time: "09:00–12:30" },
      { date: "14–16.08", city: "Сеул", event: "Финальный шопинг", time: "" },
      { date: "17.08", city: "Сеул → Шанхай → Москва", event: "ICN → PVG → SVO", time: "08:55–19:30" }
    ];

    // === МЕСТА ===
    const places = [
      { city: "Чеджудо", dates: "29–31.07", lodging: { google: "https://www.google.com/maps/place/271+Taesinhaean-ro,+Seogwipo-si,+Jeju-do+63616", naver: "https://map.naver.com/p/place/21345678" }, items: [
        { name: "Seongsan Ilchulbong Peak", stars: 5, desc: "Восход солнца, UNESCO.", google: "https://www.google.com/maps/place/Seongsan+Ilchulbong/@33.458397,126.942603,15z", naver: "https://map.naver.com/p/place/11958935" },
        { name: "Hallasan National Park", stars: 5, desc: "Тропа Eorimok.", google: "https://www.google.com/maps/place/Hallasan+National+Park/@33.3605,126.5389,13z", naver: "https://map.naver.com/p/place/11845672" }
      ]},
      { city: "Сеул", dates: "01–03.08 / 13–16.08", lodging: { google: "https://www.google.com/maps/place/12,+Daehak-ro+2-gil,+Jongno-gu,+Seoul+03126", naver: "https://map.naver.com/p/place/21345679" }, items: [
        { name: "Gyeongbokgung Palace", stars: 5, desc: "Главный дворец.", google: "https://www.google.com/maps/place/Gyeongbokgung+Palace/@37.5788,126.9773,17z", naver: "https://map.naver.com/p/place/11789456" },
        { name: "Everland Resort", stars: 5, desc: "Тематический парк.", google: "https://www.google.com/maps/place/Everland/@37.2338,127.3485,15z", naver: "https://map.naver.com/p/place/11789458" }
      ]},
      { city: "Чиндо", dates: "04–05.08", lodging: { google: "https://www.google.com/maps/place/Pyedong-gil,+Imhoe-myeon,+Jindo-gun,+Jeollanam-do+539-840", naver: "https://map.naver.com/p/place/21345680" }, items: [
        { name: "Jindo Miracle Sea Road", stars: 5, desc: "Мост Моисея (весной).", google: "https://www.google.com/maps/place/Jindo+Miracle+Sea+Road/@34.4289,126.2889,15z", naver: "https://map.naver.com/p/place/11789459" }
      ]},
      { city: "Пусан", dates: "06–08.08", lodging: { google: "https://www.google.com/maps/place/2F,+11,+Gunam-ro+8beon-gil,+Haeundae-gu,+Busan+48094", naver: "https://map.naver.com/p/place/21345681" }, items: [
        { name: "Haedong Yonggungsa Temple", stars: 5, desc: "Храм у моря.", google: "https://www.google.com/maps/place/Haedong+Yonggungsa+Temple/@35.2389,129.2089,15z", naver: "https://map.naver.com/p/place/11789460" }
      ]},
      { city: "Андон", dates: "09.08", lodging: { google: "https://www.google.com/maps/place/737-7,+Gyeongdong-ro,+Andong,+Gyeongsangbuk-do+36704", naver: "https://map.naver.com/p/place/21345682" }, items: [
        { name: "Hahoe Folk Village", stars: 5, desc: "UNESCO деревня.", google: "https://www.google.com/maps/place/Hahoe+Folk+Village/@36.4989,128.5889,15z", naver: "https://map.naver.com/p/place/11789462" }
      ]},
      { city: "Сокчхо", dates: "10–12.08", lodging: { google: "https://www.google.com/maps/place/17F,+11,+Yeongnanghaean+8-gil,+Sokcho+24808", naver: "https://map.naver.com/p/place/21345683" }, items: [
        { name: "Soraksan National Park", stars: 5, desc: "Горы, водопады.", google: "https://www.google.com/maps/place/Seoraksan+National+Park/@38.1389,128.4589,13z", naver: "https://map.naver.com/p/place/11789463" }
      ]}
    ];

    // === ЕДА (10 мест) ===
    const eats = [
      { city: "Чеджудо", dates: "29–31.07", items: [
        { name: "Black Pork Street", stars: 5, desc: "Чёрная свинина.", google: "https://www.google.com/maps/place/Black+Pork+Street/@33.2531,126.5589,15z", naver: "https://map.naver.com/p/place/11789465" },
        { name: "Okdom Restaurant", stars: 4, desc: "Традиционная кухня.", google: "https://www.google.com/maps/place/Okdom/@33.2489,126.5567,17z", naver: "https://map.naver.com/p/place/11789466" }
      ]},
      { city: "Сеул", dates: "01–03.08 / 13–16.08", items: [
        { name: "Myeongdong Kyoja", stars: 5, desc: "Лапша kalguksu.", google: "https://www.google.com/maps/place/Myeongdong+Kyoja/@37.5589,126.9889,17z", naver: "https://map.naver.com/p/place/11789467" },
        { name: "Gwangjang Market", stars: 4, desc: "Ночной рынок.", google: "https://www.google.com/maps/place/Gwangjang+Market/@37.5812,127.0003,17z", naver: "https://map.naver.com/p/place/11789468" }
      ]},
      { city: "Пусан", dates: "06–08.08", items: [
        { name: "Milmyeon at Naegohyang", stars: 5, desc: "Холодная лапша.", google: "https://www.google.com/maps/place/Naegohyang+Milmyeon/@35.1022,129.0403,17z", naver: "https://map.naver.com/p/place/11789469" }
      ]},
      { city: "Сокчхо", dates: "10–12.08", items: [
        { name: "Fresh Crab Restaurants", stars: 5, desc: "Живой краб.", google: "https://www.google.com/maps/place/Sokcho+Jungang+Market/@38.1989,128.5989,15z", naver: "https://map.naver.com/p/place/11789470" }
      ]}
    ];

    let visitedPlaces = JSON.parse(localStorage.getItem('visitedPlaces_korea2026')) || {};
    let visitedEats = JSON.parse(localStorage.getItem('visitedEats_korea2026')) || {};

    function renderItinerary() {
      let html = '<table class="calendar"><thead><tr><th>Дата</th><th>Город</th><th>Событие</th><th>Время</th></tr></thead><tbody>';
      itinerary.forEach(item => {
        html += `<tr><td>${item.date}</td><td>${item.city}</td><td>${item.event}</td><td>${item.time}</td></tr>`;
      });
      html += '</tbody></table>';
      return html;
    }

    function renderSights() {
      let html = '';
      places.forEach(cityData => {
        html += `
          <div class="section collapsed">
            <div class="section-header">
              <span>${cityData.city} (${cityData.dates})</span>
              <div style="display:flex;gap:6px;align-items:center;">
                <button class="btn-google" onclick="window.open('${cityData.lodging.google}', '_blank')">gMaps</button>
                <button class="btn-naver" onclick="window.open('${cityData.lodging.naver}', '_blank')">🚗 Naver</button>
                <span class="toggle-icon">▼</span>
              </div>
            </div>
            <div class="section-content">`;
        cityData.items.forEach(item => {
          const id = `place-${cityData.city}-${item.name}`;
          const isVisited = visitedPlaces[id];
          html += `
            <div class="item ${isVisited ? 'visited' : ''}">
              <div class="item-name">${item.name}</div>
              <div class="item-meta"><span class="stars">${'⭐'.repeat(item.stars)}</span></div>
              <div class="item-desc">${item.desc}</div>
              <div class="actions">
                <button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅' : '☑️'} Отметить</button>
                <button class="btn-google" onclick="window.open('${item.google}', '_blank')">gMaps</button>
                <button class="btn-naver" onclick="window.open('${item.naver}', '_blank')">🚗 Naver</button>
              </div>
            </div>`;
        });
        html += '</div></div>';
      });
      return html;
    }

    function renderEats() {
      let html = '';
      eats.forEach(cityData => {
        html += `
          <div class="section collapsed">
            <div class="section-header">
              <span>${cityData.city} (${cityData.dates})</span>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="section-content">`;
        cityData.items.forEach(item => {
          const id = `eat-${cityData.city}-${item.name}`;
          const isVisited = visitedEats[id];
          html += `
            <div class="item ${isVisited ? 'visited' : ''}">
              <div class="item-name">${item.name}</div>
              <div class="item-meta"><span class="stars">${'⭐'.repeat(item.stars)}</span></div>
              <div class="item-desc">${item.desc}</div>
              <div class="actions">
                <button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅' : '☑️'} Отметить</button>
                <button class="btn-google" onclick="window.open('${item.google}', '_blank')">gMaps</button>
                <button class="btn-naver" onclick="window.open('${item.naver}', '_blank')">🚗 Naver</button>
              </div>
            </div>`;
        });
        html += '</div></div>';
      });
      return html;
    }

    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('tab')) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        const tabName = e.target.dataset.tab;
        let content = '';
        if (tabName === 'itinerary') content = renderItinerary();
        else if (tabName === 'sights') content = renderSights();
        else if (tabName === 'eats') content = renderEats();
        document.getElementById('content').innerHTML = content;

        // Активация аккордеонов
        document.querySelectorAll('.section-header').forEach(header => {
          header.onclick = function() {
            this.parentElement.classList.toggle('collapsed');
          };
        });

        // Обработка отметок
        document.querySelectorAll('.btn-done').forEach(btn => {
          btn.onclick = function() {
            const id = this.dataset.id;
            if (id.startsWith('place-')) {
              visitedPlaces[id] = !visitedPlaces[id];
              localStorage.setItem('visitedPlaces_korea2026', JSON.stringify(visitedPlaces));
            } else if (id.startsWith('eat-')) {
              visitedEats[id] = !visitedEats[id];
              localStorage.setItem('visitedEats_korea2026', JSON.stringify(visitedEats));
            }
            document.querySelector('.tab.active').click();
          };
        });
      }
    });

    window.onload = () => {
      document.querySelector('.tab[data-tab="itinerary"]').click();
    };
  </script>
</body>
</html>
