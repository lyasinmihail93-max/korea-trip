<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🇰🇷 Южная Корея — Наше свадебное путешествие</title>
  <style>
    :root {
      --primary: #2a9d8f;
      --accent: #e9c46a;
      --bg: #ffffff;
      --text: #264653;
      --light-text: #6a7b7d;
      --visited-bg: #e8f7f5;
      --border: #e0e6e6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1e22;
        --text: #e0e6e6;
        --light-text: #a0b0b0;
        --visited-bg: #1e2a28;
        --border: #333c3c;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      line-height: 1.5;
    }
    header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.3em;
      margin-bottom: 4px;
      color: var(--primary);
    }
    .subtitle {
      font-size: 0.9em;
      color: var(--light-text);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 8px 0;
      z-index: 100;
    }
    .tab {
      flex: 1;
      min-width: 80px;
      padding: 10px;
      background: #f0f5f5;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      min-height: 44px;
    }
    .tab.active {
      background: var(--primary);
      color: white;
    }

    /* Section */
    .section {
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(42, 157, 143, 0.1);
      border-left: 4px solid var(--primary);
    }
    .section-header {
      background: white;
      padding: 14px 16px;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      min-height: 44px;
    }
    .toggle-icon {
      font-size: 0.7em;
      transition: transform 0.3s;
    }
    .section.collapsed .toggle-icon {
      transform: rotate(0deg);
    }
    .section:not(.collapsed) .toggle-icon {
      transform: rotate(180deg);
    }
    .section-content {
      display: none;
      background: white;
    }
    .section:not(.collapsed) .section-content {
      display: block;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Item */
    .item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .item:last-child {
      border-bottom: none;
    }
    .item.visited {
      background-color: var(--visited-bg);
    }
    .item.visited .item-name,
    .item.visited .item-desc {
      color: #5a7b7a;
      text-decoration: line-through;
    }
    .item.visited::before {
      content: "✅ ";
      color: var(--primary);
      position: absolute;
      left: 16px;
      top: 14px;
      animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .item-name {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 1.05em;
      padding-left: 20px;
    }
    .item-meta {
      font-size: 0.85em;
      color: var(--light-text);
      margin-bottom: 6px;
      display: flex;
      gap: 12px;
      padding-left: 20px;
    }
    .stars {
      color: #FFD700;
    }
    .price-tag {
      display: inline-block;
      background: #fff8e1;
      color: #ff8f00;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8em;
      cursor: help;
    }
    .item-desc {
      font-size: 0.95em;
      margin: 8px 0;
      color: var(--text);
      padding-left: 20px;
    }
    .avg-check {
      font-size: 0.9em;
      color: var(--primary);
      font-weight: 600;
      padding-left: 20px;
      margin-top: 4px;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      padding-left: 20px;
    }
    button {
      flex: 1;
      min-width: 90px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }
    .btn-done {
      background: #e0f2f1;
      color: var(--primary);
    }
    .btn-done.done {
      background: #b2dfdb;
      color: #00695c;
    }
    .btn-google {
      background: #e3f2fd;
      color: #1565c0;
    }
    .btn-naver {
      background: #f9fbe7;
      color: #5d4037;
    }

    /* Calendar */
    .calendar {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.85em;
    }
    .calendar th,
    .calendar td {
      padding: 6px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .calendar th {
      background: #f0f5f5;
      font-weight: 600;
    }

    /* Route map */
    .route-map {
      width: 100%;
      border-radius: 12px;
      margin: 16px 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* Progress bar */
    .progress-bar {
      background: #f0f5f5;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9em;
      color: var(--light-text);
    }

    /* Search & Filter */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .search-input, .filter-select {
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9em;
      flex: 1;
      min-width: 120px;
    }

    /* Back to top */
    #backToTop {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--primary);
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: none;
      z-index: 99;
    }

    @media (min-width: 768px) {
      body { max-width: 800px; margin: 0 auto; }
    }
  </style>
</head>

          { name: "Seorak Spa Valley", google: "https://maps.app.goo.gl/SeorakSpaValley", naver: "https://map.naver.com/p/place/11789487", desc: "Горячие источники после треккинга — идеальное завершение дня. Без ночлега, вход включает душ, сауну, бассейн.", stars: 4.6, price: "12 000 ₩ (~840 ₽)" }
        ]
      }
    ];

    // === СОСТОЯНИЕ ===
    let visitedPlaces = JSON.parse(localStorage.getItem('visitedPlaces_korea2026')) || {};
    let visitedEats = JSON.parse(localStorage.getItem('visitedEats_korea2026')) || {};
    let visitedSpas = JSON.parse(localStorage.getItem('visitedSpas_korea2026')) || {};

    // === ФУНКЦИИ ОТОБРАЖЕНИЯ ===
    function renderItinerary() {
      let html = '<img src="route-map.jpg" alt="Маршрут по Южной Корее" class="route-map">';
      html += '<table class="calendar"><thead><tr><th>Дата</th><th>Город</th><th>Событие</th><th>Время</th></tr></thead><tbody>';
      itinerary.forEach(item => {
        html += `<tr><td>${item.date}</td><td>${item.city}</td><td>${item.event}</td><td>${item.time}</td></tr>`;
      });
      html += '</tbody></table>';
      return html;
    }

    function renderSights() {
      let html = '<div class="controls"><input type="text" class="search-input" placeholder="Поиск..."><select class="filter-select"><option value="all">Все звёзды</option><option value="5">⭐⭐⭐⭐⭐</option></select></div>';
      places.forEach(cityData => {
        html += `
          <div class="section collapsed">
            <div class="section-header">
              <span>${cityData.city} (${cityData.dates})</span>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="section-content">`;
        cityData.items.forEach(item => {
          const id = `place-${cityData.city}-${item.name}`;
          const isVisited = visitedPlaces[id];
          html += `
            <div class="item ${isVisited ? 'visited' : ''}">
              <div class="item-name">${item.name} ${item.price ? '<span class="price-tag" title="Вход: ' + item.price + '">💰</span>' : ''}</div>
              <div class="item-meta">${item.stars > 0 ? '⭐'.repeat(Math.round(item.stars)) : ''}</div>
              <div class="item-desc">${item.desc}</div>
              <div class="actions">
                <button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅' : '☑️'} Отметить</button>
                <button class="btn-google" onclick="window.open('${item.google}', '_blank')">gMaps</button>
                <button class="btn-naver" onclick="window.open('${item.naver}', '_blank')">🚗 Naver</button>
              </div>
            </div>`;
        });
        html += '</div></div>';
      });
      return html;
    }

    // Аналогично — renderEats(), renderSpas()

    // === ИНИЦИАЛИЗАЦИЯ ===
    document.addEventListener('click', function(e) {
      // Переключение вкладок
      if (e.target.classList.contains('tab')) {
        // ... логика обновления контента
      }

      // Аккордеоны
      if (e.target.closest('.section-header')) {
        const section = e.target.closest('.section');
        section.classList.toggle('collapsed');
      }

      // Отметка посещения
      if (e.target.classList.contains('btn-done')) {
        const id = e.target.dataset.id;
        // ... сохранение в localStorage
        // ВАЖНО: не вызываем повторный рендер всей страницы, а только обновляем кнопку
        e.target.textContent = e.target.textContent.includes('✅') ? '☑️ Отметить' : '✅ Посещено';
        e.target.classList.toggle('done');
      }
    });

    // Кнопка "Наверх"
    window.addEventListener('scroll', () => {
      const btn = document.getElementById('backToTop');
      if (window.scrollY > 300) btn.style.display = 'block';
      else btn.style.display = 'none';
    });
    document.getElementById('backToTop').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

    // Загрузка первой вкладки
    window.onload = () => {
      document.querySelector('.tab[data-tab="itinerary"]').click();
    };
  </script>
</body>
</html>
