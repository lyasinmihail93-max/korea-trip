<title>🇰🇷 Южная Корея — Наше свадебное путешествие</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
--primary: #2a9d8f;
--accent: #e9c46a;
--bg: #fafbfb;
--text: #264653;
--light-text: #6a7b7d;
--visited-bg: #a5d6a7;
--visited-light: #c8e6c9;
--border: #e0e6e6;
--button-bg-google: #e3f2fd;
--button-bg-naver: #f9fbe7;
--button-bg-done: #e0f2f1;
--progress-light: #e8f5e9;
--route-btn-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background-color: #fafbfb;
background-image: radial-gradient(#e0f2f1 1.5px, transparent 1.5px);
background-size: 20px 20px;
color: var(--text);
padding: 12px;
line-height: 1.6;
}
header {
text-align: center;
margin-bottom: 16px;
padding: 60px 12px;
border-bottom: 1px solid var(--border);
background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
            url('header-bg.jpg');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
color: white;
text-shadow: 0 2px 4px rgba(0,0,0,0.7);
border-radius: 12px;
}
h1 {
font-size: 1.4em;
margin-bottom: 4px;
color: white;
font-weight: 700;
letter-spacing: 0.5px;
}
.subtitle {
font-size: 0.95em;
color: rgba(255,255,255,0.9);
font-weight: 400;
}
.progress-bar {
background: rgba(255,255,255,0.95);
padding: 12px;
border-radius: 8px;
margin-bottom: 16px;
font-size: 0.9em;
color: var(--light-text);
border: 1px solid var(--primary);
position: relative;
overflow: hidden;
backdrop-filter: blur(10px);
}
.progress-bar::before {
content: '';
position: absolute;
top: 0;
left: 0;
height: 100%;
background: linear-gradient(90deg, var(--visited-light) 0%, #81c784 50%, var(--visited-light) 100%);
width: var(--progress-width, 0%);
transition: width 0.5s ease;
z-index: 0;
}
.progress-bar .progress-text {
position: relative;
z-index: 1;
}
.route-btn {
width: 100%;
padding: 14px;
background: var(--route-btn-bg);
color: white;
border: none;
border-radius: 12px;
font-weight: 700;
font-size: 1em;
cursor: pointer;
margin-bottom: 16px;
transition: all 0.3s ease;
box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
font-family: 'Noto Sans', sans-serif;
}
.route-btn:hover {
transform: translateY(-2px);
box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
}
.route-btn.active {
background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%);
box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
}
.city-tabs {
display: flex;
flex-wrap: wrap;
gap: 8px;
margin-bottom: 16px;
}
.city-tab {
flex: 1 0 calc(20% - 8px);
min-width: 70px;
padding: 10px 6px;
background: #f0f5f5;
border: 1px solid var(--primary);
border-radius: 8px;
font-weight: 600;
color: var(--text);
cursor: pointer;
min-height: 44px;
transition: all 0.3s ease;
font-family: 'Noto Sans', sans-serif;
font-size: 0.8em;
text-align: center;
white-space: nowrap;
}
.city-tab.active {
background: var(--primary);
color: white;
}
.city-banner {
width: 100%;
height: 200px;
background-size: cover;
background-position: center;
background-repeat: no-repeat;
border-radius: 12px;
margin-bottom: 16px;
position: relative;
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.city-banner::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.6));
border-radius: 12px;
}
.city-banner .city-name {
position: relative;
z-index: 1;
color: white;
font-size: 1.5em;
font-weight: 700;
text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}
.accommodation {
background: white;
border-radius: 12px;
padding: 16px;
margin-bottom: 16px;
box-shadow: 0 2px 6px rgba(42, 157, 143, 0.1);
border-left: 4px solid var(--primary);
}
.accommodation-title {
font-weight: 600;
margin-bottom: 8px;
color: var(--primary);
display: flex;
align-items: center;
gap: 6px;
}
.accommodation-list {
margin-top: 12px;
}
.accommodation-item {
padding: 10px 0;
border-bottom: 1px dashed var(--border);
}
.accommodation-item:last-child {
border-bottom: none;
}
.accommodation-name {
font-weight: 600;
margin-bottom: 4px;
font-size: 1em;
display: flex;
justify-content: space-between;
align-items: center;
}
.booking-dates {
font-size: 0.8em;
color: var(--primary);
background: var(--progress-light);
padding: 2px 8px;
border-radius: 4px;
font-weight: 600;
}
.accommodation-address {
font-size: 0.85em;
color: var(--light-text);
margin-bottom: 6px;
}
.accommodation-links {
display: flex;
gap: 6px;
}
.accommodation-links a {
flex: 1;
padding: 6px;
text-align: center;
border-radius: 6px;
text-decoration: none;
font-size: 0.8em;
font-weight: 600;
min-height: 36px;
display: flex;
align-items: center;
justify-content: center;
}
.link-google {
background: var(--button-bg-google);
color: #1565c0;
border: 1px solid #1565c0;
}
.link-naver {
background: var(--button-bg-naver);
color: #5d4037;
border: 1px solid #5d4037;
}
.city-progress {
background: rgba(255,255,255,0.95);
padding: 10px 16px;
border-radius: 8px;
margin-bottom: 16px;
font-size: 0.85em;
color: var(--light-text);
border: 1px solid var(--primary);
position: relative;
overflow: hidden;
backdrop-filter: blur(4px);
}
.city-progress::before {
content: '';
position: absolute;
top: 0;
left: 0;
height: 100%;
background: linear-gradient(90deg, var(--visited-light) 0%, #81c784 50%, var(--visited-light) 100%);

z-index: 0;
}
.city-progress .progress-text {
position: relative;
z-index: 1;

}
.city-subtabs {
display: flex;
gap: 8px;
margin-bottom: 16px;
flex-wrap: wrap;
}
.subtab {

padding: 10px;
background: #f0f5f5;
border: 1px solid var(--primary);
border-radius: 8px;
font-weight: 600;
color: var(--text);

min-height: 44px;
transition: all 0.3s ease;
font-family: 'Noto Sans', sans-serif;
}
.subtab.active {
background: var(--primary);

transform: scale(1.02);
}
.items-list {
background: white;
border-radius: 12px;
overflow: hidden;
box-shadow: 0 2px 6px rgba(42, 157, 143, 0.1);
border-left: 4px solid var(--primary);
}
.item {
padding: 14px 16px;
border-bottom: 1px solid var(--border);
position: relative;
transition: all 0.3s ease;
}
.item:last-child {
border-bottom: none;
}
.item.visited {
background-color: var(--visited-bg) !important;
}
.item.visited .item-name,
.item.visited .item-desc,
.item.visited .price-info,
.item.visited .avg-check {
text-decoration: line-through !important;
color: #00695c !important;
}
.item-name {
font-weight: 600;
margin-bottom: 4px;
font-size: 1.05em;
padding-left: 20px;
color: var(--text) !important;
}
.item-stars {
font-size: 1em;
color: #ffb300;
padding-left: 20px;
margin-top: 2px;
letter-spacing: 1px;
}
.item-desc {
font-size: 0.95em;
margin: 8px 0;
color: var(--text) !important;
padding-left: 20px;
}
.price-info {
font-size: 0.9em;
color: #ff8f00;
padding-left: 20px;
margin-top: 4px;
}
.avg-check {
font-size: 0.9em;
color: var(--primary) !important;
font-weight: 600;
padding-left: 20px;
margin-top: 4px;
}
.actions {
display: flex;
gap: 8px;
margin-top: 10px;
flex-wrap: wrap;
padding-left: 20px;
}
button {
flex: 1;
min-width: 90px;
padding: 10px;
border: 1px solid var(--primary);
border-radius: 6px;
font-size: 0.85em;
font-weight: 600;
cursor: pointer;
min-height: 44px;
transition: all 0.3s ease;
font-family: 'Noto Sans', sans-serif;
}
.btn-done {
background: var(--button-bg-done);
color: var(--primary);
}
.btn-done.done {
background: var(--button-bg-done);
color: var(--primary);
border-color: var(--primary);
}
.btn-google {
background: var(--button-bg-google);
color: #1565c0;
}
.btn-naver {
background: var(--button-bg-naver);
color: #5d4037;
}
.route-container {
background: white;
border-radius: 12px;
padding: 16px;
margin: 16px 0;
box-shadow: 0 2px 6px rgba(42, 157, 143, 0.1);
border-left: 4px solid var(--primary);
}
.calendar {
width: 100%;
border-collapse: collapse;
font-size: 0.85em;
}
.calendar th,
.calendar td {
padding: 8px 6px;
text-align: left;
border-bottom: 1px solid var(--border);
}
.calendar th {
background: #f0f5f5;
font-weight: 600;
}
#backToTop {
position: fixed;
bottom: 20px;
right: 20px;
background: var(--primary);
color: white;
width: 44px;
height: 44px;
border-radius: 50%;
border: 2px solid white;
font-size: 18px;
cursor: pointer;
display: none;
z-index: 99;
box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
@media (min-width: 768px) {
body { max-width: 800px; margin: 0 auto; }
.city-tab { min-width: 80px; padding: 10px 8px; }
}
@media (max-width: 480px) {
.city-tab { flex: 1 0 calc(25% - 8px); min-width: 60px; padding: 8px 4px; font-size: 0.7em; }
header { padding: 50px 12px; }
h1 { font-size: 1.2em; }
.city-banner { height: 160px; }
.city-banner .city-name { font-size: 1.3em; }
}

function renderItinerary() {
return `<div class="route-container"><table class="calendar"><thead><tr><th>Дата</th><th>Город</th><th>Событие</th><th>Время</th></tr></thead><tbody>${itinerary.map(i => `<tr><td>${i.date}</td><td>${i.city}</td><td>${i.event}</td><td>${i.time}</td></tr>`).join('')}</tbody></table></div>`;
}
function renderCityBanner(cityKey, cityName) {
return `<div class="city-banner" style="background-image: url('${cityKey}-banner.jpg')"><div class="city-name">${cityName}</div></div>`;
}
function renderAccommodation(cityKey) {
const accList = accommodations[cityKey];
if (!accList || accList.length === 0) return '';
let html = `<div class="accommodation"><div class="accommodation-title">🏠 Жильё</div>`;
accList.forEach((acc, idx) => {
html += `<div class="accommodation-item"><div class="accommodation-name">${acc.name}<span class="booking-dates">${acc.dates}</span></div><div class="accommodation-address">${acc.address}</div><div class="accommodation-links"><a href="${acc.google}" target="_blank" class="link-google">🗺️ Google</a><a href="${acc.naver}" target="_blank" class="link-naver">🚗 Naver</a></div></div>`;
});
html += '</div>';
return html;
}
function renderCityProgress(cityKey) {
const cityName = getCityDisplayName(cityKey);
let total = 0, visited = 0;
const placesData = places.find(c => c.city === cityName);
if (placesData) { total += placesData.items.length; visited += placesData.items.filter(item => visitedPlaces[`place-${cityName}-${item.name}`]).length; }
const eatsData = eats.find(c => c.city === cityName);
if (eatsData) { total += eatsData.items.length; visited += eatsData.items.filter(item => visitedEats[`eat-${cityName}-${item.name}`]).length; }
const spaKey = getSpaKeyForCity(cityKey);
if (spaKey && spas[spaKey]) { total += spas[spaKey].length; visited += spas[spaKey].filter(item => visitedSpas[`spa-${cityKey}-${item.name}`]).length; }
const percent = total > 0 ? Math.round((visited / total) * 100) : 0;
return `<div class="city-progress" style="--progress-width: ${percent}%"><span class="progress-text">✅ Посещено: ${visited} из ${total} (${percent}%)</span></div>`;
}
function renderSubtabs(cityKey, hasSpa) {
let html = `<div class="city-subtabs">`;
html += `<button class="subtab ${currentSubtab === 'places' ? 'active' : ''}" data-type="places" data-city="${cityKey}">Места</button>`;
html += `<button class="subtab ${currentSubtab === 'eats' ? 'active' : ''}" data-type="eats" data-city="${cityKey}">Еда</button>`;
if (hasSpa) html += `<button class="subtab ${currentSubtab === 'spas' ? 'active' : ''}" data-type="spas" data-city="${cityKey}">Бани</button>`;
html += `</div>`;
return html;
}
function getCityDisplayName(cityKey) {
const map = { jeju: 'Чеджудо', seoul: 'Сеул', jeonju: 'Чонджу', jindo: 'Чиндо', busan: 'Пусан', gyeongju: 'Кёнджу', andong: 'Андон', samcheok: 'Самчхок', sokcho: 'Сокчхо/Сораксан' };
return map[cityKey] || cityKey;
}
function getSpaKeyForCity(cityKey) {
if (cityKey === 'sokcho') return 'sokcho';
if (cityKey === 'busan') return 'busan';
if (cityKey === 'seoul') return 'seoul';
return null;
}
function renderItemsList(items, type, cityKey, cityName) {
if (!items || items.length === 0) return '<div class="items-list"><p style="padding:16px;color:var(--light-text)">Пока не добавлено</p></div>';
return `<div class="items-list">${items.map(item => {
const id = `${type}-${cityName}-${item.name}`;
const isVisited = type === 'place' ? visitedPlaces[id] : (type === 'eat' ? visitedEats[id] : visitedSpas[id]);
return `<div class="item ${isVisited ? 'visited' : ''}" data-id="${id}"><div class="item-name">${item.name}</div><div class="item-stars">${generateStars(item.stars)}</div><div class="item-desc">${item.desc}</div>${item.price ? `<div class="price-info">💰 ${item.price}</div>` : ''}${item.avgCheck ? `<div class="avg-check">💰 Средний чек: ${item.avgCheck}</div>` : ''}<div class="actions"><button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}" data-type="${type}">${isVisited ? (type === 'eat' ? '✅ Попробовано' : '✅ Посещено') : '☑️ Отметить'}</button><button class="btn-google" onclick="window.open('${item.google}', '_blank')">gMaps</button><button class="btn-naver" onclick="window.open('${item.naver}', '_blank')">🚗 Naver</button></div></div>`;
}).join('')}</div>`;
}
function renderCityContent(cityKey, subtab) {
const cityName = getCityDisplayName(cityKey);
let html = renderCityBanner(cityKey, cityName);
const accHtml = renderAccommodation(cityKey);
if (accHtml) html += accHtml;
html += renderCityProgress(cityKey);
const hasSpa = getSpaKeyForCity(cityKey) !== null;
html += renderSubtabs(cityKey, hasSpa);
if (subtab === 'places') { const items = places.find(c => c.city === cityName)?.items || []; html += renderItemsList(items, 'place', cityKey, cityName); }
else if (subtab === 'eats') { const items = eats.find(c => c.city === cityName)?.items || []; html += renderItemsList(items, 'eat', cityKey, cityName); }
else if (subtab === 'spas' && hasSpa) { const spaKey = getSpaKeyForCity(cityKey); const items = spas[spaKey] || []; html += renderItemsList(items, 'spa', cityKey, cityName); }
return html;
}
function updateProgress() {
const totalPlaces = places.reduce((sum, c) => sum + c.items.length, 0);
const visitedCount = Object.values(visitedPlaces).filter(v => v).length;
const totalEats = eats.reduce((sum, c) => sum + c.items.length, 0);
const visitedEatsCount = Object.values(visitedEats).filter(v => v).length;
const totalSpas = Object.values(spas).reduce((sum, arr) => sum + arr.length, 0);
const visitedSpasCount = Object.values(visitedSpas).filter(v => v).length;
const totalItems = totalPlaces + totalEats + totalSpas;
const visitedTotal = visitedCount + visitedEatsCount + visitedSpasCount;
const progressPercent = totalItems > 0 ? Math.round((visitedTotal / totalItems) * 100) : 0;
const progressBar = document.getElementById('progressBar');
progressBar.style.setProperty('--progress-width', `${progressPercent}%`);
progressBar.innerHTML = `<span class="progress-text">✅ Посещено: ${visitedCount}/${totalPlaces} мест | ${visitedEatsCount}/${totalEats} ресторанов | ${visitedSpasCount}/${totalSpas} бань (${progressPercent}%)</span>`;
}
function handleDoneClick(btn) {
const id = btn.dataset.id;
const type = btn.dataset.type;
if (type === 'place') { visitedPlaces[id] = !visitedPlaces[id]; localStorage.setItem('visitedPlaces_korea2026', JSON.stringify(visitedPlaces)); }
else if (type === 'eat') { visitedEats[id] = !visitedEats[id]; localStorage.setItem('visitedEats_korea2026', JSON.stringify(visitedEats)); }
else if (type === 'spa') { visitedSpas[id] = !visitedSpas[id]; localStorage.setItem('visitedSpas_korea2026', JSON.stringify(visitedSpas)); }
const item = btn.closest('.item');
if (item) {
if (visitedPlaces[id] || visitedEats[id] || visitedSpas[id]) { item.classList.add('visited'); btn.textContent = type === 'eat' ? '✅ Попробовано' : '✅ Посещено'; }
else { item.classList.remove('visited'); btn.textContent = '☑️ Отметить'; }
}
updateProgress();
if (currentCity) {
const cityProgress = document.querySelector('.city-progress');
if (cityProgress) cityProgress.outerHTML = renderCityProgress(currentCity);
}
}
function attachEventListeners() {
document.querySelectorAll('.subtab').forEach(subtab => {
subtab.addEventListener('click', function(e) {
e.preventDefault();
e.stopPropagation();
const rect = this.getBoundingClientRect();
const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
document.querySelectorAll('.subtab').forEach(s => s.classList.remove('active'));
this.classList.add('active');
currentSubtab = this.dataset.type;
const city = this.dataset.city;
const container = document.getElementById('content');
const banner = container.querySelector('.city-banner')?.outerHTML || '';
const acc = accommodations[city] ? renderAccommodation(city) : '';
const progress = renderCityProgress(city);
const hasSpa = getSpaKeyForCity(city) !== null;
const subtabs = renderSubtabs(city, hasSpa);
let newContent = '';
if (currentSubtab === 'places') { const cityName = getCityDisplayName(city); const items = places.find(c => c.city === cityName)?.items || []; newContent = renderItemsList(items, 'place', city, cityName); }
else if (currentSubtab === 'eats') { const cityName = getCityDisplayName(city); const items = eats.find(c => c.city === cityName)?.items || []; newContent = renderItemsList(items, 'eat', city, cityName); }
else if (currentSubtab === 'spas' && hasSpa) { const cityName = getCityDisplayName(city); const spaKey = getSpaKeyForCity(city); const items = spas[spaKey] || []; newContent = renderItemsList(items, 'spa', city, cityName); }
container.innerHTML = banner + acc + progress + subtabs + newContent;
attachEventListeners();
window.scrollTo({ top: scrollTop - rect.top + 150, behavior: 'auto' });
});
});
document.querySelectorAll('.btn-done').forEach(btn => {
btn.addEventListener('click', function(e) {
e.preventDefault();
e.stopPropagation();
handleDoneClick(this);
});
});
}

document.addEventListener('DOMContentLoaded', function() {
document.getElementById('routeTab').addEventListener('click', function(e) {
e.preventDefault();
const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
document.getElementById('routeTab').classList.add('active');
document.querySelectorAll('.city-tab').forEach(t => t.classList.remove('active'));
currentCity = null;
document.getElementById('content').innerHTML = renderItinerary();
updateProgress();
window.scrollTo({ top: scrollTop, behavior: 'auto' });
});
document.querySelectorAll('.city-tab').forEach(tab => {
tab.addEventListener('click', function(e) {
e.preventDefault();
const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
document.getElementById('routeTab').classList.remove('active');
document.querySelectorAll('.city-tab').forEach(t => t.classList.remove('active'));
this.classList.add('active');
currentCity = this.dataset.city;
currentSubtab = 'places';
document.getElementById('content').innerHTML = renderCityContent(currentCity, currentSubtab);
attachEventListeners();
updateProgress();
window.scrollTo({ top: scrollTop, behavior: 'auto' });
});
});
updateProgress();
});
window.addEventListener('scroll', () => {
const btn = document.getElementById('backToTop');
if (window.scrollY > 300) btn.style.display = 'block';
else btn.style.display = 'none';
});
document.getElementById('backToTop').addEventListener('click', (e) => {
e.preventDefault();
window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
