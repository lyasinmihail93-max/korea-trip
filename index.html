  <style>
    :root {
      --primary: #4a6fa5;
      --visited-bg: #c8e6c9;
      --border: #ddd;
      --text: #333;
      --light-text: #666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: var(--text);
      padding: 12px;
      line-height: 1.5;
    }
    header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.4em;
      margin-bottom: 6px;
      color: var(--primary);
    }
    .instructions {
      font-size: 0.9em;
      color: var(--light-text);
      margin-bottom: 16px;
    }

    .city-section {
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .city-header {
      background: white;
      padding: 14px 16px;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .city-header::after {
      content: "▼";
      font-size: 0.7em;
      transition: transform 0.3s;
    }
    .city-section.active .city-header::after {
      transform: rotate(180deg);
    }
    .city-content {
      display: none;
      background: white;
    }
    .city-section.active .city-content {
      display: block;
    }

    .place {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .place:last-child {
      border-bottom: none;
    }
    .place.visited {
      background-color: var(--visited-bg);
    }
    .place.visited .place-name,
    .place.visited .place-desc,
    .place.visited .place-meta {
      text-decoration: line-through;
      color: #2e7d32;
    }
    .place-name {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 1.05em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .place-meta {
      font-size: 0.85em;
      color: var(--light-text);
      margin-bottom: 6px;
      display: flex;
      gap: 12px;
    }
    .stars {
      color: #FFD700;
    }
    .place-desc {
      font-size: 0.95em;
      margin: 8px 0;
      color: var(--text);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    button {
      flex: 1;
      min-width: 100px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active {
      opacity: 0.8;
    }
    .btn-done {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .btn-done.done {
      background: #a5d6a7;
      color: #1b5e20;
    }
    .btn-google {
      background: #e3f2fd;
      color: #1565c0;
    }
    .btn-naver {
      background: #f9fbe7;
      color: #5d4037;
    }

    @media (min-width: 768px) {
      body { max-width: 800px; margin: 0 auto; }
    }
  </style>

      { city: "Чонджу", icon: "🍚", name: "Bibimbap Alley", stars: 5, desc: "Родина бибимбапа! Подается в горячей каменной миске.", google: "https://www.google.com/maps/place/Jeonju+Bibimbap+Alley/@35.8189,127.1519,15z", naver: "https://map.naver.com/p/search/Bibimbap%20Alley" },
      { city: "Пусан", icon: "🍜", name: "Milmyeon at Naegohyang", stars: 5, desc: "Холодная пшеничная лапша — фирменное блюдо Пусана.", google: "https://www.google.com/maps/place/Naegohyang+Milmyeon/@35.1022,129.0403,17z", naver: "https://map.naver.com/p/search/Naegohyang" },
      { city: "Пусан", icon: "🍲", name: "Dwaeji Gukbap Street", stars: 4, desc: "Свиной суп с рисом — сытно и аутентично.", google: "https://www.google.com/maps/place/Dwaeji+Gukbap+Street/@35.1022,129.0403,17z", naver: "https://map.naver.com/p/search/Dwaeji%20Gukbap" },
      { city: "Кёнджу", icon: "🍞", name: "Hwangnam Bread (ppopgi)", stars: 4, desc: "Мини-пирожки с бобовой пастой — символ Кёнджу.", google: "https://www.google.com/maps/place/Hwangnam+Ppopgi/@35.8386,129.2192,17z", naver: "https://map.naver.com/p/search/Hwangnam%20Bread" },
      { city: "Сокчхо", icon: "🦀", name: "Fresh Crab Restaurants", stars: 5, desc: "Живой краб, приготовленный тут же. Лучше всего в августе!", google: "https://www.google.com/maps/place/Sokcho+Jungang+Market/@38.1989,128.5989,15z", naver: "https://map.naver.com/p/search/Sokcho%20Crab" }
    ];

    // Загрузка состояния
    let visitedPlaces = JSON.parse(localStorage.getItem('visitedPlaces_korea2026')) || {};
    let visitedEats = JSON.parse(localStorage.getItem('visitedEats_korea2026')) || {};
    let expandedCities = JSON.parse(localStorage.getItem('expandedCities_korea2026')) || {};

    function groupByCity(list) {
      return list.reduce((acc, item) => {
        if (!acc[item.city]) acc[item.city] = [];
        acc[item.city].push(item);
        return acc;
      }, {});
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      // === ДОСТОПРИМЕЧАТЕЛЬНОСТИ ===
      const placeGroups = groupByCity(places);
      for (const city in placeGroups) {
        const section = document.createElement('div');
        section.className = `city-section ${expandedCities[city] ? 'active' : ''}`;
        section.innerHTML = `<div class="city-header">${city}</div><div class="city-content"></div>`;
        app.appendChild(section);

        const content = section.querySelector('.city-content');
        placeGroups[city].forEach(place => {
          const id = `place-${city}-${place.name}`;
          const isVisited = visitedPlaces[id];
          const el = document.createElement('div');
          el.className = `place ${isVisited ? 'visited' : ''}`;
          el.innerHTML = `
            <div class="place-name">${place.icon} ${place.name}</div>
            <div class="place-meta"><span>${place.dates}</span><span class="stars">${'⭐'.repeat(place.stars)}</span></div>
            <div class="place-desc">${place.desc}</div>
            <div class="actions">
              <button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅ Посещено' : '☑️ Отметить'}</button>
              <button class="btn-google" onclick="window.open('${place.google}', '_blank')">🗺️ Google</button>
              <button class="btn-naver" onclick="window.open('${place.naver}', '_blank')">🚗 Naver</button>
            </div>
          `;
          content.appendChild(el);
        });

        section.querySelector('.city-header').addEventListener('click', () => {
          const wasActive = section.classList.contains('active');
          section.classList.toggle('active');
          expandedCities[city] = !wasActive;
          localStorage.setItem('expandedCities_korea2026', JSON.stringify(expandedCities));
        });
      }

      // === ЕДА ===
      const eatSection = document.createElement('div');
      eatSection.className = 'city-section';
      eatSection.innerHTML = `<div class="city-header">🍽️ Где поесть</div><div class="city-content"></div>`;
      app.appendChild(eatSection);

      const eatContent = eatSection.querySelector('.city-content');
      eats.forEach(eat => {
        const id = `eat-${eat.city}-${eat.name}`;
        const isVisited = visitedEats[id];
        const el = document.createElement('div');
        el.className = `place ${isVisited ? 'visited' : ''}`;
        el.innerHTML = `
          <div class="place-name">${eat.icon} ${eat.name}</div>
          <div class="place-meta"><span>${eat.city}</span><span class="stars">${'⭐'.repeat(eat.stars)}</span></div>
          <div class="place-desc">${eat.desc}</div>
          <div class="actions">
            <button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅ Попробовано' : '☑️ Отметить'}</button>
            <button class="btn-google" onclick="window.open('${eat.google}', '_blank')">🗺️ Google</button>
            <button class="btn-naver" onclick="window.open('${eat.naver}', '_blank')">🚗 Naver</button>
          </div>
        `;
        eatContent.appendChild(el);
      });

      eatSection.querySelector('.city-header').addEventListener('click', () => {
        eatSection.classList.toggle('active');
      });

      // Обработчики кнопок
      document.querySelectorAll('.btn-done').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.target.dataset.id;
          if (id.startsWith('place-')) {
            visitedPlaces[id] = !visitedPlaces[id];
            localStorage.setItem('visitedPlaces_korea2026', JSON.stringify(visitedPlaces));
          } else if (id.startsWith('eat-')) {
            visitedEats[id] = !visitedEats[id];
            localStorage.setItem('visitedEats_korea2026', JSON.stringify(visitedEats));
          }
          render();
        });
      });
    }

    render();
  </script>
</body>
</html>
