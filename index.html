<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🇰🇷 Южная Корея — Наше свадебное путешествие</title>
  <style>
    :root {
      --primary: #2a9d8f;
      --accent: #e9c46a;
      --bg: #ffffff;
      --text: #264653;
      --light-text: #6a7b7d;
      --visited-bg: #a5d6a7;
      --border: #e0e6e6;
      --button-bg-google: #e3f2fd;
      --button-bg-naver: #f9fbe7;
      --button-bg-done: #e0f2f1;
    }
    .dark-mode {
      --bg: #1e1e1e;
      --text: #e0e6e6;
      --light-text: #a0b0b0;
      --visited-bg: #1e3a28;
      --border: #333c3c;
      --button-bg-google: #1e2a3a;
      --button-bg-naver: #2a2a1e;
      --button-bg-done: #1e2a28;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      line-height: 1.5;
    }
    header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    h1 {
      font-size: 1.3em;
      margin-bottom: 4px;
      color: var(--primary);
    }
    .subtitle {
      font-size: 0.9em;
      color: var(--light-text);
    }

    /* Theme toggle */
    .theme-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--primary);
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 8px 0;
      z-index: 100;
    }
    .tab {
      flex: 1;
      min-width: 80px;
      padding: 10px;
      background: #f0f5f5;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      min-height: 44px;
    }
    .tab.active {
      background: var(--primary);
      color: white;
    }

    /* Section */
    .section {
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(42, 157, 143, 0.1);
      border-left: 4px solid var(--primary);
    }
    .section-header {
      background: white;
      padding: 14px 16px;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      min-height: 44px;
    }
    .toggle-icon {
      font-size: 0.7em;
      transition: transform 0.3s;
    }
    .section.collapsed .toggle-icon {
      transform: rotate(0deg);
    }
    .section:not(.collapsed) .toggle-icon {
      transform: rotate(180deg);
    }
    .section-content {
      display: none;
      background: white;
    }
    .section:not(.collapsed) .section-content {
      display: block;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Item */
    .item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .item:last-child {
      border-bottom: none;
    }
    .item.visited {
      background-color: var(--visited-bg) !important;
    }
    .item.visited .item-name,
    .item.visited .item-desc,
    .item.visited .price-info,
    .item.visited .avg-check {
      text-decoration: line-through !important;
      color: #00695c !important;
    }
    .item-name {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 1.05em;
      padding-left: 20px;
      color: var(--text) !important;
    }
    .item-desc {
      font-size: 0.95em;
      margin: 8px 0;
      color: var(--text) !important;
      padding-left: 20px;
    }
    .price-info {
      font-size: 0.9em;
      color: #ff8f00;
      padding-left: 20px;
      margin-top: 4px;
    }
    .avg-check {
      font-size: 0.9em;
      color: var(--primary) !important;
      font-weight: 600;
      padding-left: 20px;
      margin-top: 4px;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      padding-left: 20px;
    }
    button {
      flex: 1;
      min-width: 90px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }
    .btn-done {
      background: var(--button-bg-done);
      color: var(--primary);
    }
    .btn-done.done {
      background: var(--visited-bg);
      color: #00695c;
    }
    .btn-google {
      background: var(--button-bg-google);
      color: #1565c0;
    }
    .btn-naver {
      background: var(--button-bg-naver);
      color: #5d4037;
    }

    /* Calendar */
    .calendar {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.85em;
    }
    .calendar th,
    .calendar td {
      padding: 6px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .calendar th {
      background: #f0f5f5;
      font-weight: 600;
    }

    /* Route map */
    .route-map {
      width: 100%;
      border-radius: 12px;
      margin: 16px 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* Progress bar */
    .progress-bar {
      background: #f0f5f5;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9em;
      color: var(--light-text);
    }

    /* Back to top */
    #backToTop {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--primary);
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: none;
      z-index: 99;
    }

    @media (min-width: 768px) {
      body { max-width: 800px; margin: 0 auto; }
    }
  </style>
</head>

  </header>

    // === ФУНКЦИИ ===
    function renderItinerary() {
      return `
        <img src="route-map.jpg" alt="Маршрут по Южной Корее" class="route-map">
        <table class="calendar">
          <thead><tr><th>Дата</th><th>Город</th><th>Событие</th><th>Время</th></tr></thead>

        </table>
      `;
    }

    function renderSights() {
      let html = '';
      places.forEach(cityData => {
        html += `<div class="section collapsed"><div class="section-header">${cityData.city} (${cityData.dates})<span class="toggle-icon">▼</span></div><div class="section-content">`;
        cityData.items.forEach(item => {
          const id = `place-${cityData.city}-${item.name}`;
          const isVisited = visitedPlaces[id];
          html += `
            <div class="item ${isVisited ? 'visited' : ''}">
              <div class="item-name">${item.name}</div>
              <div class="item-desc">${item.desc}</div>
              ${item.price ? `<div class="price-info">Вход: ${item.price}</div>` : ''}
              <div class="actions">
                <button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅ Посещено' : '☑️ Отметить'}</button>
                <button class="btn-google" onclick="window.open('${item.google}', '_blank')">gMaps</button>
                <button class="btn-naver" onclick="window.open('${item.naver}', '_blank')">🚗 Naver</button>
              </div>
            </div>`;
        });
        html += '</div></div>';
      });
      return html;
    }

    function renderEats() {
      let html = '';

          const isVisited = visitedEats[id];
          html += `

    function updateProgress() {
      const totalPlaces = places.reduce((sum, c) => sum + c.items.length, 0);
      const visitedCount = Object.values(visitedPlaces).filter(v => v).length;
      const totalEats = eats.reduce((sum, c) => sum + c.items.length, 0);
      const visitedEatsCount = Object.values(visitedEats).filter(v => v).length;
      document.getElementById('progressBar').innerHTML = 
        `✅ Посещено: ${visitedCount} / ${totalPlaces} мест | ${visitedEatsCount} / ${totalEats} ресторанов`;
    }

    // === ИНИЦИАЛИЗАЦИЯ ===
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('tab')) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        const tabName = e.target.dataset.tab;
        let content = '';
        if (tabName === 'itinerary') content = renderItinerary();
        else if (tabName === 'sights') content = renderSights();
        else if (tabName === 'eats') content = renderEats();
        else if (tabName === 'spas') content = renderSpas();
        document.getElementById('content').innerHTML = content;

        document.querySelectorAll('.section-header').forEach(header => {
          header.onclick = function() {
            this.parentElement.classList.toggle('collapsed');
          };
        });

        document.querySelectorAll('.btn-done').forEach(btn => {
          btn.onclick = function() {
            const id = this.dataset.id;
            if (id.startsWith('place-')) {
              visitedPlaces[id] = !visitedPlaces[id];
              localStorage.setItem('visitedPlaces_korea2026', JSON.stringify(visitedPlaces));
            } else if (id.startsWith('eat-')) {
              visitedEats[id] = !visitedEats[id];
              localStorage.setItem('visitedEats_korea2026', JSON.stringify(visitedEats));
            } else if (id.startsWith('spa-')) {
              visitedSpas[id] = !visitedSpas[id];
              localStorage.setItem('visitedSpas_korea2026', JSON.stringify(visitedSpas));
            }
            this.textContent = this.textContent.includes('✅') ? '☑️ Отметить' : '✅ Посещено';
            this.classList.toggle('done');
            updateProgress();
          };
        });

        updateProgress();
      }

      if (e.target.id === 'backToTop') {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    window.addEventListener('scroll', () => {
      const btn = document.getElementById('backToTop');
      if (window.scrollY > 300) btn.style.display = 'block';
      else btn.style.display = 'none';
    });

    window.onload = () => {
      document.querySelector('.tab[data-tab="itinerary"]').click();
    };
