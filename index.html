<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🇰🇷 Южная Корея — Наше свадебное путешествие</title>
  <style>
    :root {
      --primary: #2a9d8f;
      --accent: #e9c46a;
      --bg: #ffffff;
      --text: #264653;
      --light-text: #6a7b7d;
      --visited-bg: #e8f7f5;
      --border: #e0e6e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      line-height: 1.5;
    }
    header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.3em;
      margin-bottom: 4px;
      color: var(--primary);
    }
    .subtitle {
      font-size: 0.9em;
      color: var(--light-text);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tab {
      flex: 1;
      min-width: 100px;
      padding: 10px;
      background: #f0f5f5;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--primary);
      color: white;
    }

    /* City section */
    .city-section {
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(42, 157, 143, 0.1);
      border-left: 4px solid var(--primary);
    }
    .city-header {
      background: white;
      padding: 14px 16px;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .city-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .city-dates {
      color: var(--light-text);
      font-size: 0.9em;
      margin-left: 8px;
    }
    .city-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .toggle-icon {
      font-size: 0.7em;
      transition: transform 0.3s;
    }
    .city-section.active .toggle-icon {
      transform: rotate(180deg);
    }
    .city-content {
      display: none;
      background: white;
    }
    .city-section.active .city-content {
      display: block;
    }

    /* Place item */
    .place {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .place:last-child {
      border-bottom: none;
    }
    .place.visited {
      background-color: var(--visited-bg);
    }
    .place.visited .place-name,
    .place.visited .place-desc {
      color: #5a7b7a;
      text-decoration: line-through;
    }
    .place.visited::before {
      content: "✅ ";
      color: var(--primary);
    }
    .place-name {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 1.05em;
    }
    .place-meta {
      font-size: 0.85em;
      color: var(--light-text);
      margin-bottom: 6px;
      display: flex;
      gap: 12px;
    }
    .stars {
      color: #FFD700;
    }
    .place-desc {
      font-size: 0.95em;
      margin: 8px 0;
      color: var(--text);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    button {
      flex: 1;
      min-width: 90px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active {
      opacity: 0.8;
    }
    .btn-done {
      background: #e0f2f1;
      color: var(--primary);
    }
    .btn-done.done {
      background: #b2dfdb;
      color: #00695c;
    }
    .btn-google {
      background: #e3f2fd;
      color: #1565c0;
    }
    .btn-naver {
      background: #f9fbe7;
      color: #5d4037;
    }
    .btn-lodging {
      background: #fff8e1;
      color: #ff8f00;
      font-weight: bold;
    }

    /* Progress bar */
    .progress {
      background: #f0f5f5;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9em;
      color: var(--light-text);
    }

    @media (min-width: 768px) {
      body { max-width: 800px; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Южная Корея — наше свадебное путешествие</h1>
    <p class="subtitle">Июль–август 2026</p>
  </header>

  <div class="progress" id="progressBar"></div>

  <div class="tabs">
    <button class="tab active" data-tab="itinerary">🗓️ Маршрут</button>
    <button class="tab" data-tab="sights">🗺️ Места</button>
    <button class="tab" data-tab="eats">🍽️ Еда</button>
  </div>

  <div id="content"></div>

  <script>
    // === ДАННЫЕ ===
    const itinerary = [
      { date: "25.07", day: "Сб", event: "Свадьба, Ульяновск" },
      { date: "26.07", day: "Вс", event: "Свадьба, второй день" },
      { date: "27.07", day: "Пн", event: "Ульяновск → Москва" },
      { date: "28.07", day: "Вт", event: "Москва → Пекин (ночной перелёт)" },
      { date: "29.07", day: "Ср", event: "Пекин → Чеджудо (17:55)" },
      { date: "30–31.07", day: "", event: "Чеджудо — пляжи, Hallasan, Seongsan" },
      { date: "01.08", day: "Сб", event: "Чеджудо → Сеул (17:30)" },
      { date: "02–03.08", day: "", event: "Сеул — дворцы, ханоки, шопинг" },
      { date: "04.08", day: "Вт", event: "Сеул → Чонджу → Чиндо" },
      { date: "05.08", day: "Ср", event: "Чиндо — Мост чуда" },
      { date: "06.08", day: "Чт", event: "Чиндо → Пусан" },
      { date: "07–08.08", day: "", event: "Пусан — пляжи, храмы, рынки" },
      { date: "09.08", day: "Вс", event: "Пусан → Кёнджу → Андон" },
      { date: "10.08", day: "Пн", event: "Андон → Сокчхо" },
      { date: "11–12.08", day: "", event: "Сокчхо — Сораксан, море" },
      { date: "13–16.08", day: "", event: "Сокчхо → Сеул — финальный шопинг" },
      { date: "17.08", day: "Пн", event: "Сеул → Шанхай → Москва" }
    ];

    const places = [
      { city: "Чеджудо", dates: "29–31.07", lodging: { google: "https://www.google.com/maps/place/271+Taesinhaean-ro,+Seogwipo-si,+Jeju-do+63616", naver: "https://map.naver.com/p/search/271+Taesinhaean-ro" }, items: [
        { name: "Seongsan Ilchulbong Peak", stars: 5, desc: "Вулканический кратер у моря, знаменит восходами солнца. UNESCO.", google: "https://www.google.com/maps/place/Seongsan+Ilchulbong/@33.458397,126.942603,15z", naver: "https://map.naver.com/p/place/11958935" },
        { name: "Hallasan National Park", stars: 5, desc: "Высочайшая гора Южной Кореи. Тропа Eorimok — подъём ~2 ч.", google: "https://www.google.com/maps/place/Hallasan+National+Park/@33.3605,126.5389,13z", naver: "https://map.naver.com/p/place/11845672" },
        { name: "Manjanggul Lava Tube", stars: 5, desc: "Одна из самых длинных лавовых пещер в мире.", google: "https://www.google.com/maps/place/Manjanggul+Lava+Tube/@33.4986,126.8461,15z", naver: "https://map.naver.com/p/place/11845673" }
      ]},
      { city: "Сеул", dates: "01–03.08 / 13–16.08", lodging: { google: "https://www.google.com/maps/place/12,+Daehak-ro+2-gil,+Jongno-gu,+Seoul+03126", naver: "https://map.naver.com/p/search/12+Daehak-ro+2-gil" }, items: [
        { name: "Gyeongbokgung Palace", stars: 5, desc: "Главный королевский дворец династии Чосон.", google: "https://www.google.com/maps/place/Gyeongbokgung+Palace/@37.5788,126.9773,17z", naver: "https://map.naver.com/p/place/11789456" },
        { name: "Bukchon Hanok Village", stars: 5, desc: "Исторический район с традиционными домами.", google: "https://www.google.com/maps/place/Bukchon+Hanok+Village/@37.5812,126.9903,16z", naver: "https://map.naver.com/p/place/11789457" },
        { name: "Everland Resort", stars: 5, desc: "Крупнейший тематический парк Южной Кореи.", google: "https://www.google.com/maps/place/Everland/@37.2338,127.3485,15z", naver: "https://map.naver.com/p/place/11789458" }
      ]},
      { city: "Чиндо", dates: "04–05.08", lodging: { google: "https://www.google.com/maps/place/Pyedong-gil,+Imhoe-myeon,+Jindo-gun,+Jeollanam-do+539-840", naver: "https://map.naver.com/p/search/Pyedong-gil+Jindo" }, items: [
        { name: "Jindo Miracle Sea Road", stars: 5, desc: "«Мост Моисея» — море расступается (весной).", google: "https://www.google.com/maps/place/Jindo+Miracle+Sea+Road/@34.4289,126.2889,15z", naver: "https://map.naver.com/p/place/11789459" }
      ]},
      { city: "Пусан", dates: "06–08.08", lodging: { google: "https://www.google.com/maps/place/2F,+11,+Gunam-ro+8beon-gil,+Haeundae-gu,+Busan+48094", naver: "https://map.naver.com/p/search/Gunam-ro+8beon-gil" }, items: [
        { name: "Haedong Yonggungsa Temple", stars: 5, desc: "Буддийский храм прямо у моря.", google: "https://www.google.com/maps/place/Haedong+Yonggungsa+Temple/@35.2389,129.2089,15z", naver: "https://map.naver.com/p/place/11789460" },
        { name: "Jagalchi Fish Market", stars: 5, desc: "Крупнейший рыбный рынок Кореи.", google: "https://www.google.com/maps/place/Jagalchi+Fish+Market/@35.1022,129.0403,17z", naver: "https://map.naver.com/p/place/11789461" }
      ]},
      { city: "Андон", dates: "09.08", lodging: { google: "https://www.google.com/maps/place/737-7,+Gyeongdong-ro,+Andong,+Gyeongsangbuk-do+36704", naver: "https://map.naver.com/p/search/737-7+Gyeongdong-ro" }, items: [
        { name: "Hahoe Folk Village", stars: 5, desc: "Традиционная деревня у реки Накдонган.", google: "https://www.google.com/maps/place/Hahoe+Folk+Village/@36.4989,128.5889,15z", naver: "https://map.naver.com/p/place/11789462" }
      ]},
      { city: "Сокчхо", dates: "10–12.08", lodging: { google: "https://www.google.com/maps/place/17F,+11,+Yeongnanghaean+8-gil,+Sokcho+24808", naver: "https://map.naver.com/p/search/Yeongnanghaean+8-gil" }, items: [
        { name: "Soraksan National Park", stars: 5, desc: "Грандиозные скалы, леса, водопады.", google: "https://www.google.com/maps/place/Seoraksan+National+Park/@38.1389,128.4589,13z", naver: "https://map.naver.com/p/place/11789463" },
        { name: "Naksansa Temple", stars: 4, desc: "Храм у Восточного моря.", google: "https://www.google.com/maps/place/Naksansa+Temple/@38.1189,128.5889,15z", naver: "https://map.naver.com/p/place/11789464" }
      ]}
    ];

    const eats = [
      { city: "Чеджудо", name: "Black Pork Street", stars: 5, desc: "Знаменитая чеджуская чёрная свинина.", google: "https://www.google.com/maps/place/Black+Pork+Street/@33.2531,126.5589,15z", naver: "https://map.naver.com/p/place/11789465" },
      { city: "Сеул", name: "Myeongdong Kyoja", stars: 5, desc: "Легендарная лапша kalguksu.", google: "https://www.google.com/maps/place/Myeongdong+Kyoja/@37.5589,126.9889,17z", naver: "https://map.naver.com/p/place/11789466" },
      { city: "Чонджу", name: "Bibimbap Alley", stars: 5, desc: "Родина бибимбапа!", google: "https://www.google.com/maps/place/Jeonju+Bibimbap+Alley/@35.8189,127.1519,15z", naver: "https://map.naver.com/p/place/11789467" },
      { city: "Пусан", name: "Milmyeon at Naegohyang", stars: 5, desc: "Холодная пшеничная лапша.", google: "https://www.google.com/maps/place/Naegohyang+Milmyeon/@35.1022,129.0403,17z", naver: "https://map.naver.com/p/place/11789468" },
      { city: "Сокчхо", name: "Fresh Crab Restaurants", stars: 5, desc: "Живой краб, приготовленный тут же.", google: "https://www.google.com/maps/place/Sokcho+Jungang+Market/@38.1989,128.5989,15z", naver: "https://map.naver.com/p/place/11789469" }
    ];

    // === СОСТОЯНИЕ ===
    let visitedPlaces = JSON.parse(localStorage.getItem('visitedPlaces_korea2026')) || {};
    let visitedEats = JSON.parse(localStorage.getItem('visitedEats_korea2026')) || {};

    // === ФУНКЦИИ ===
    function renderItinerary() {
      let html = '<div class="city-section" style="border-left: 4px solid #e9c46a;"><div class="city-header" style="justify-content: center;">🗓️ Маршрут по дням</div><div class="city-content">';
      itinerary.forEach(item => {
        html += `<div class="place"><strong>${item.date} ${item.day}</strong><br>${item.event}</div>`;
      });
      html += '</div></div>';
      return html;
    }

    function renderSights() {
      let html = '';
      places.forEach(cityData => {
        const cityId = `city-${cityData.city}`;
        html += `
          <div class="city-section">
            <div class="city-header">
              <div class="city-title">
                <span>${cityData.city}</span>
                <span class="city-dates">(${cityData.dates})</span>
              </div>
              <div class="city-actions">
                <button class="btn-lodging" onclick="openMaps('${cityData.lodging.google}', '${cityData.lodging.naver}')">🏨 Ночлег</button>
                <span class="toggle-icon">▼</span>
              </div>
            </div>
            <div class="city-content">`;
        cityData.items.forEach(item => {
          const id = `place-${cityData.city}-${item.name}`;
          const isVisited = visitedPlaces[id];
          html += `
            <div class="place ${isVisited ? 'visited' : ''}">
              <div class="place-name">${item.name}</div>
              <div class="place-meta"><span class="stars">${'⭐'.repeat(item.stars)}</span></div>
              <div class="place-desc">${item.desc}</div>
              <div class="actions">
                <button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅ Посещено' : '☑️ Отметить'}</button>
                <button class="btn-google" onclick="window.open('${item.google}', '_blank')">🗺️ Google</button>
                <button class="btn-naver" onclick="window.open('${item.naver}', '_blank')">🚗 Naver</button>
              </div>
            </div>`;
        });
        html += '</div></div>';
      });
      return html;
    }

    function renderEats() {
      let html = '<div class="city-section" style="border-left: 4px solid #e9c46a;"><div class="city-header" style="justify-content: center;">🍽️ Где поесть</div><div class="city-content">';
      eats.forEach(eat => {
        const id = `eat-${eat.city}-${eat.name}`;
        const isVisited = visitedEats[id];
        html += `
          <div class="place ${isVisited ? 'visited' : ''}">
            <div class="place-name">${eat.city}: ${eat.name}</div>
            <div class="place-meta"><span class="stars">${'⭐'.repeat(eat.stars)}</span></div>
            <div class="place-desc">${eat.desc}</div>
            <div class="actions">
              <button class="btn-done ${isVisited ? 'done' : ''}" data-id="${id}">${isVisited ? '✅ Попробовано' : '☑️ Отметить'}</button>
              <button class="btn-google" onclick="window.open('${eat.google}', '_blank')">🗺️ Google</button>
              <button class="btn-naver" onclick="window.open('${eat.naver}', '_blank')">🚗 Naver</button>
            </div>
          </div>`;
      });
      html += '</div></div>';
      return html;
    }

    function updateProgress() {
      const totalPlaces = places.reduce((sum, c) => sum + c.items.length, 0);
      const visitedCount = Object.values(visitedPlaces).filter(v => v).length;
      const totalEats = eats.length;
      const visitedEatsCount = Object.values(visitedEats).filter(v => v).length;
      document.getElementById('progressBar').innerHTML = 
        `✅ Посещено: ${visitedCount} / ${totalPlaces} мест | ${visitedEatsCount} / ${totalEats} ресторанов`;
    }

    function openMaps(googleUrl, naverUrl) {
      if (confirm('Открыть карты для навигации?')) {
        window.open(googleUrl, '_blank');
        window.open(naverUrl, '_blank');
      }
    }

    // === ИНИЦИАЛИЗАЦИЯ ===
    function init() {
      // Вкладки
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const tabName = tab.dataset.tab;
          let content = '';
          if (tabName === 'itinerary') content = renderItinerary();
          else if (tabName === 'sights') content = renderSights();
          else if (tabName === 'eats') content = renderEats();
          document.getElementById('content').innerHTML = content;
          updateProgress();
        });
      });

      // Обработчики отметок
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('btn-done')) {
          const id = e.target.dataset.id;
          if (id.startsWith('place-')) {
            visitedPlaces[id] = !visitedPlaces[id];
            localStorage.setItem('visitedPlaces_korea2026', JSON.stringify(visitedPlaces));
          } else if (id.startsWith('eat-')) {
            visitedEats[id] = !visitedEats[id];
            localStorage.setItem('visitedEats_korea2026', JSON.stringify(visitedEats));
          }
          document.querySelector('.tab.active').click(); // refresh
        }
      });

      // Загрузка первой вкладки
      document.querySelector('.tab[data-tab="itinerary"]').click();
    }

    init();
  </script>
</body>
</html>
